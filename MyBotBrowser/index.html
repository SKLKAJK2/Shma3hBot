<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shma3hBot - الواجهة الرسمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #020617;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        .glow {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body onclick="hideMessages()" class="min-h-screen flex flex-col items-center justify-center bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-blue-900/20 via-slate-950 to-black">

    <div class="text-center z-10 px-4">
        <h1 class="text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-blue-600 mb-6 drop-shadow-lg">
            Shma3hBot
        </h1>
        
        <p class="text-gray-400 text-lg md:text-xl max-w-2xl mx-auto mb-10 leading-relaxed">
            النظام الأكثر تطوراً لإدارة وحماية سيرفرات الديسكورد، مصمم لتقديم تجربة فريدة وسرعة لا تضاهى.
        </p>

        <div class="flex flex-wrap justify-center gap-4">
            <a href="#" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-10 rounded-2xl transition-all transform hover:scale-105 glow">
                إضافة البوت
            </a>
            <a href="#" class="bg-slate-800/50 hover:bg-slate-800 text-white font-bold py-4 px-10 rounded-2xl border border-slate-700 transition-all">
                الدعم الفني
            </a>
        </div>
    </div>

    <div id="private-messages" class="fixed bottom-10 right-10 bg-slate-900/90 border border-blue-500/30 p-6 rounded-3xl backdrop-blur-md shadow-2xl transition-all duration-500 max-w-xs">
        <div class="flex items-center gap-2 mb-3">
            <span class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span>
            </span>
            <h3 class="text-blue-400 font-bold text-sm">نظام shma3h للمراسلة</h3>
        </div>
        <p class="text-gray-300 text-sm leading-relaxed">
            تم حفظ رسائلك الخاصة بأمان. النظام الآن يعمل بتغيير IP تلقائي وتشفير كامل للبيانات.
        </p>
        <p class="text-[10px] text-gray-500 mt-4 italic">اضغط في أي مكان لإخفاء هذا التنبيه</p>
    </div>

    <script>
        // وظيفة إخفاء الرسائل عند النقر
        function hideMessages() {
            const msgBox = document.getElementById('private-messages');
            msgBox.style.opacity = '0';
            setTimeout(() => {
                msgBox.style.display = 'none';
            }, 500);
        }
    </script>

    </body>
</html>
